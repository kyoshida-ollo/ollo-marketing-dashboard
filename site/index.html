<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ollo マーケティングダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --muted: #898781;
    --gridline: #e1e0d9;
    --border: rgba(11, 11, 11, 0.10);

    --series-1: #2a78d6;
    --series-2: #1baf7a;
    --series-3: #eda100;
    --series-4: #008300;
    --series-5: #4a3aa7;
    --series-6: #e34948;
    --series-7: #e87ba4;
    --series-8: #eb6834;

    --good: #006300;
    --bad: #c02b2b;
    --funnel-1: #86b6ef;
    --funnel-2: #5598e7;
    --funnel-3: #2a78d6;
    --funnel-4: #1c5cab;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --muted: #898781;
      --gridline: #2c2c2a;
      --border: rgba(255, 255, 255, 0.10);

      --series-1: #3987e5;
      --series-2: #199e70;
      --series-3: #c98500;
      --series-4: #008300;
      --series-5: #9085e9;
      --series-6: #e66767;
      --series-7: #d55181;
      --series-8: #d95926;

      --good: #0ca30c;
      --bad: #e66767;
      --funnel-1: #86b6ef;
      --funnel-2: #5598e7;
      --funnel-3: #3987e5;
      --funnel-4: #1c5cab;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
  }

  header {
    padding: 20px clamp(16px, 4vw, 40px) 0;
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 1.35rem;
  }

  #meta {
    color: var(--text-secondary);
    font-size: 0.85rem;
  }

  .badge {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--series-3);
    color: #1a1a19;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .header-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--page);
    z-index: 20;
  }

  #tab-nav {
    display: flex;
    gap: 4px;
  }

  .tab {
    appearance: none;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 8px 14px 10px;
    font-size: 0.95rem;
    font-family: inherit;
    color: var(--text-secondary);
    cursor: pointer;
  }

  .tab:hover { color: var(--text-primary); }

  .tab.active {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom-color: var(--series-1);
  }

  #period-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    padding-bottom: 8px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  #period-bar select {
    font-family: inherit;
    font-size: 0.85rem;
    color: var(--text-primary);
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
  }

  main {
    padding: 0 clamp(16px, 4vw, 40px) 40px;
  }

  .section { margin-top: 24px; }

  .section h2 {
    font-size: 1.02rem;
    margin: 0 0 12px;
    color: var(--text-primary);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    min-width: 0;
  }

  .card.wide { grid-column: 1 / -1; }

  .card h3 {
    margin: 0 0 12px;
    font-size: 0.92rem;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .kpi-cell {
    padding: 4px 0;
    min-width: 0;
  }

  .kpi-label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .kpi-value-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }

  .kpi-value {
    font-size: 1.45rem;
    font-weight: 700;
    line-height: 1.2;
    font-variant-numeric: tabular-nums;
  }

  .delta {
    font-size: 0.78rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .delta.good { color: var(--good); }
  .delta.bad { color: var(--bad); }
  .delta.flat { color: var(--muted); }

  .sparkline {
    position: relative;
    height: 30px;
    margin-top: 6px;
    opacity: 0.85;
  }

  .funnel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px 0;
  }

  .funnel-row {
    display: grid;
    grid-template-columns: 72px 1fr 130px;
    align-items: center;
    gap: 10px;
  }

  .funnel-label {
    font-size: 0.82rem;
    color: var(--text-secondary);
    text-align: right;
  }

  .funnel-track { min-width: 0; }

  .funnel-bar {
    display: flex;
    align-items: center;
    height: 30px;
    min-width: 44px;
    border-radius: 4px;
    padding: 0 8px;
  }

  .funnel-bar-1 { background: var(--funnel-1); }
  .funnel-bar-2 { background: var(--funnel-2); }
  .funnel-bar-3 { background: var(--funnel-3); }
  .funnel-bar-4 { background: var(--funnel-4); }

  .funnel-count {
    font-size: 0.82rem;
    font-weight: 700;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }

  .funnel-conv {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .insights {
    margin: 0;
    padding-left: 1.3em;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }

  .insights strong { color: var(--text-primary); }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.86rem;
    white-space: nowrap;
  }

  th, td {
    padding: 7px 12px;
    text-align: left;
    border-bottom: 1px solid var(--gridline);
  }

  th {
    color: var(--muted);
    font-weight: 600;
    font-size: 0.8rem;
  }

  th.sortable {
    cursor: pointer;
    user-select: none;
  }

  th.sortable:hover { color: var(--text-primary); }
  th.sorted-asc::after { content: " ↑"; }
  th.sorted-desc::after { content: " ↓"; }

  tbody tr:hover td { background: rgba(42, 120, 214, 0.06); }

  td.num, th.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .total-row td {
    font-weight: 700;
    border-top: 2px solid var(--border);
  }
</style>
</head>
<body>
<header>
  <h1>ollo マーケティングダッシュボード</h1>
  <div id="meta"></div>
  <div class="header-bar">
    <nav id="tab-nav"></nav>
    <div id="period-bar">
      <span>対象期間</span>
      <select id="period-from"></select>
      <span>〜</span>
      <select id="period-to"></select>
    </div>
  </div>
</header>
<main id="dashboard-root"></main>

<script src="charts/charts.js"></script>
<script src="../data/dashboard_data.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
